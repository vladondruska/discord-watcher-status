<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Discord Watcher · Status</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #fff; --ink: #1c1e21; --muted: #6b7280;
    --line: #e5e7eb; --ok: #17803d; --okbg: #e7f6ec; --warn: #9a6700;
    --warnbg: #fff4d6; --bad: #b42318; --badbg: #fdeceb; --accent: #2563eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1216; --card: #171b21; --ink: #e7eaee; --muted: #93a0b0;
      --line: #262c34; --ok: #4ade80; --okbg: #10261a; --warn: #fbbf24;
      --warnbg: #2a2109; --bad: #f87171; --badbg: #2a1414; --accent: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px 16px 48px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px; margin-bottom: 6px; }
  h1 { font-size: 19px; margin: 0; font-weight: 650; letter-spacing: -.01em; }
  .badge {
    font-size: 13px; font-weight: 650; padding: 3px 10px; border-radius: 999px;
    background: var(--okbg); color: var(--ok); border: 1px solid transparent;
  }
  .badge.fail { background: var(--badbg); color: var(--bad); }
  .badge.stale { background: var(--warnbg); color: var(--warn); }
  .updated { color: var(--muted); font-size: 13px; margin-left: auto; }
  .updated.warn { color: var(--warn); font-weight: 600; }
  .updated.bad  { color: var(--bad);  font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .card h2 { margin: 0 0 10px; font-size: 12px; font-weight: 650; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .row .k { color: var(--muted); }
  .row .v { font-variant-numeric: tabular-nums; font-weight: 550; text-align: right; }
  .v.ok { color: var(--ok); } .v.warn { color: var(--warn); } .v.bad { color: var(--bad); }
  .bar { height: 8px; border-radius: 999px; background: var(--line); overflow: hidden; margin-top: 8px; }
  .bar > span { display: block; height: 100%; background: var(--accent); }
  .bar.warn > span { background: var(--warn); } .bar.bad > span { background: var(--bad); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }
  .dot.ok { background: var(--ok); } .dot.bad { background: var(--bad); }
  footer { color: var(--muted); font-size: 12px; margin-top: 22px; text-align: center; }
  a { color: var(--accent); }
  .err { background: var(--badbg); color: var(--bad); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-top: 16px; }
  .msgwrap { margin-top: 24px; }
  .msghead { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .msghead h2 { margin: 0; font-size: 15px; font-weight: 650; }
  .msgmeta { color: var(--muted); font-size: 12px; margin-left: auto; }
  .msglist { list-style: none; margin: 0; padding: 0; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .msgitem { display: flex; gap: 12px; padding: 10px 14px; background: var(--card); border-top: 1px solid var(--line); }
  .msgitem:first-child { border-top: none; }
  .msgitem.act { box-shadow: inset 3px 0 0 var(--accent); }
  .msgitem time { flex: 0 0 auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; padding-top: 1px; }
  .msgtext { white-space: pre-wrap; word-break: break-word; }
  .msgempty, .keyhint { color: var(--muted); font-size: 13px; padding: 12px 2px; }
  .keyhint code { font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 5px; }
  .keyform { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .keyform input { font: inherit; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); color: var(--ink); width: min(280px, 60%); }
  .keyform button { font: inherit; font-weight: 600; padding: 8px 14px; margin-left: 8px; border: none; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer; }
  .keyerr { color: var(--bad); font-size: 13px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Discord Watcher</h1>
    <span id="overall" class="badge">…</span>
    <span id="updated" class="updated">loading…</span>
  </header>
  <div id="problems" class="err" style="display:none"></div>
  <div id="grid" class="grid"></div>

  <section class="msgwrap">
    <div class="msghead">
      <h2>Messages · last 24h</h2>
      <span id="msgmeta" class="msgmeta"></span>
    </div>
    <div id="msgbody"></div>
  </section>

  <footer>
    Auto-refreshes every 60&nbsp;s · published by the Pi watchdog every ~5&nbsp;min.
    Times are your local time.
  </footer>
</div>

<script>
const $ = (id) => document.getElementById(id);

function ago(iso) {
  if (!iso) return { text: "never", mins: Infinity };
  const t = Date.parse(iso);
  if (isNaN(t)) return { text: "—", mins: Infinity };
  const s = Math.max(0, Math.round((Date.now() - t) / 1000));
  const mins = s / 60;
  let text;
  if (s < 60) text = s + "s ago";
  else if (s < 3600) text = Math.round(s / 60) + "m ago";
  else if (s < 86400) text = Math.round(s / 3600) + "h ago";
  else text = Math.round(s / 86400) + "d ago";
  return { text, mins };
}
function dur(sec) {
  sec = Number(sec) || 0;
  if (sec < 60) return sec + "s";
  if (sec < 3600) return Math.floor(sec / 60) + "m";
  if (sec < 86400) return Math.floor(sec / 3600) + "h " + Math.floor((sec % 3600) / 60) + "m";
  return Math.floor(sec / 86400) + "d " + Math.floor((sec % 86400) / 3600) + "h";
}
function localTime(iso) {
  if (!iso) return "—";
  const t = Date.parse(iso);
  return isNaN(t) ? "—" : new Date(t).toLocaleString();
}
function esc(s) { return String(s).replace(/[<>&]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c])); }
const bool = (b, yes, no) => `<span class="dot ${b ? "ok" : "bad"}"></span>${b ? yes : no}`;

function card(title, rows) {
  const body = rows.map(([k, v, cls]) =>
    `<div class="row"><span class="k">${k}</span><span class="v ${cls || ""}">${v}</span></div>`).join("");
  return `<div class="card"><h2>${title}</h2>${body}</div>`;
}

function render(d) {
  // Overall + staleness
  const u = ago(d.updated);
  const ub = $("updated");
  ub.textContent = "updated " + u.text;
  ub.className = "updated" + (u.mins > 30 ? " bad" : u.mins > 12 ? " warn" : "");
  const stale = u.mins > 12;
  const ov = $("overall");
  const good = d.status === "OK" && !stale;
  ov.textContent = stale ? "STALE" : d.status;
  ov.className = "badge" + (stale ? " stale" : d.status === "OK" ? "" : " fail");

  const prob = $("problems");
  if (d.problems && d.problems.trim()) {
    prob.style.display = ""; prob.textContent = "Problems: " + d.problems;
  } else prob.style.display = "none";

  const cards = [];

  // Watcher
  const w = d.watcher || {};
  cards.push(card("Watcher", [
    ["Process", bool(w.running, "running", "DOWN"), w.running ? "ok" : "bad"],
    ["Uptime", w.running ? dur(w.uptime_s) : "—"],
    ["Chromium", (d.chromium ?? 0) + " proc", (d.chromium > 0) ? "" : "bad"],
    ["X / openbox", bool(d.openbox, "running", "down"), d.openbox ? "ok" : "bad"],
  ]));

  // Memory
  const m = d.memory || {};
  cards.push(card("Memory (available)", [
    ["Now", (m.avail_mb ?? "—") + " MB", m.avail_mb < 120 ? "warn" : ""],
    ["Min today", (m.min_today_mb ?? "—") + (m.min_today_mb != null ? " MB" : ""), m.min_today_mb < 100 ? "bad" : ""],
  ]));

  // Thermal
  const th = d.thermal || {};
  const tCls = th.temp_c >= 70 ? "bad" : th.temp_c >= 60 ? "warn" : "";
  cards.push(card("Thermal / power", [
    ["Temp", (th.temp_c ?? "—") + (th.temp_c != null ? " °C" : ""), tCls],
    ["Max today", (th.max_today_c ?? "—") + (th.max_today_c != null ? " °C" : ""), th.max_today_c >= 70 ? "bad" : th.max_today_c >= 60 ? "warn" : ""],
    ["Throttling now", bool(!th.throttling_now, "no", "YES"), th.throttling_now ? "bad" : "ok"],
    ["Throttled flags", esc(th.throttled ?? "—"), (th.throttled && th.throttled !== "0x0") ? "warn" : ""],
  ]));

  // ntfy quota
  const n = d.ntfy || {};
  const pct = n.limit ? Math.min(100, Math.round((n.sent / n.limit) * 100)) : 0;
  const nCls = n.remaining <= 10 ? "bad" : n.remaining <= 30 ? "warn" : "ok";
  cards.push(`<div class="card"><h2>ntfy quota (today, UTC)</h2>
    <div class="row"><span class="k">Sent</span><span class="v">${n.sent ?? "—"} / ${n.limit ?? "—"}</span></div>
    <div class="row"><span class="k">Remaining</span><span class="v ${nCls}">${n.remaining ?? "—"}</span></div>
    <div class="bar ${n.remaining <= 10 ? "bad" : n.remaining <= 30 ? "warn" : ""}"><span style="width:${pct}%"></span></div>
  </div>`);

  // Events
  const e = d.events || {};
  const gaa = ago(e.last_gaa);
  cards.push(card("Activity", [
    ["Last GAA alert", gaa.text],
    ["Last channel load", ago(e.last_channel_load).text],
    ["Last recovery", ago(e.last_recover).text],
    ["Crashes today", (e.crashes_today ?? 0), (e.crashes_today > 5) ? "warn" : ""],
  ]));

  $("grid").innerHTML = cards.join("");
}

async function renderStatus() {
  try {
    const r = await fetch("status.json?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    render(await r.json());
  } catch (err) {
    $("updated").textContent = "fetch failed";
    $("updated").className = "updated bad";
    $("overall").textContent = "?";
    $("overall").className = "badge stale";
    $("problems").style.display = "";
    $("problems").textContent = "Could not load status.json: " + err.message;
  }
}

// --- Encrypted 24h message feed (decrypted in-browser with a key kept only in
// this browser's localStorage; the published file is ciphertext only). ---
const b64bytes = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
let feedKey = localStorage.getItem("gaaFeedKey") || null;
let lastFeed = null;

function fmtDT(iso) {
  const t = Date.parse(iso);
  if (isNaN(t)) return "—";
  const d = new Date(t);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
async function decryptFeed(obj, keyB64) {
  const key = await crypto.subtle.importKey("raw", b64bytes(keyB64), { name: "AES-GCM" }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64bytes(obj.iv) }, key, b64bytes(obj.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
function keyForm(err) {
  return `<div class="keyform">
    ${err ? `<div class="keyerr">${esc(err)}</div>` : ""}
    <input id="keyin" type="password" placeholder="feed key" autocomplete="off" spellcheck="false">
    <button id="keybtn">Unlock</button>
    <div class="keyhint">Paste the key from the Pi: <code>ssh pi 'cat ~/.gaa-feed-key'</code>. Stored only in this browser.</div>
  </div>`;
}
function wireKeyForm() {
  const inp = $("keyin"), btn = $("keybtn");
  const submit = () => {
    const v = inp.value.trim();
    if (!v) return;
    feedKey = v; localStorage.setItem("gaaFeedKey", v);
    renderMessages();
  };
  btn.onclick = submit;
  inp.onkeydown = (e) => { if (e.key === "Enter") submit(); };
}
async function renderMessages() {
  const body = $("msgbody"), meta = $("msgmeta");
  if (lastFeed === null) {
    try {
      const r = await fetch("messages.json?t=" + Date.now(), { cache: "no-store" });
      if (r.status === 404) { meta.textContent = ""; body.innerHTML = `<div class="msgempty">No message feed published yet.</div>`; return; }
      if (!r.ok) throw new Error("HTTP " + r.status);
      lastFeed = await r.json();
    } catch (e) {
      meta.textContent = "";
      body.innerHTML = `<div class="msgempty">Could not load feed: ${esc(e.message)}</div>`;
      return;
    }
  }
  const feed = lastFeed;
  meta.textContent = "updated " + ago(feed.updated).text + " · " + (feed.count ?? 0) + " msg";
  if (!feedKey) { body.innerHTML = keyForm(); wireKeyForm(); return; }
  try {
    const items = await decryptFeed(feed, feedKey);
    if (!items.length) { body.innerHTML = `<div class="msgempty">No messages from the target in the last 24 h.</div>`; return; }
    body.innerHTML = `<ul class="msglist">` + items.map(m =>
      `<li class="msgitem${m.actionable ? " act" : ""}"><time>${fmtDT(m.ts)}</time><span class="msgtext">${esc(m.text) || "<em>(no text)</em>"}</span></li>`
    ).join("") + `</ul><div class="keyhint"><a href="#" id="forget">forget key on this device</a></div>`;
    $("forget").onclick = (e) => { e.preventDefault(); localStorage.removeItem("gaaFeedKey"); feedKey = null; renderMessages(); };
  } catch (e) {
    localStorage.removeItem("gaaFeedKey"); feedKey = null;
    body.innerHTML = keyForm("Wrong key — could not decrypt. Try again.");
    wireKeyForm();
  }
}

function tick() {
  renderStatus();
  lastFeed = null;   // force a re-fetch of the feed each cycle
  renderMessages();
}
tick();
setInterval(tick, 60000);
</script>
</body>
</html>
